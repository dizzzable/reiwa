# ════════════════════════════════════════════════════════════════════════════
#  reiwa — Docker Compose
#
#  reiwa is a stateless edge / BFF (Backend for Frontend) for the Rezeis
#  user-facing surface (Telegram Mini App + Web). It owns no relational
#  state: every business read and write is proxied to rezeis-admin over
#  HTTP inside the shared `remnawave-network`.
#
#  The only stateful dependency reiwa has is reiwa-redis, used for
#  ephemeral edge concerns:
#    • web/TMA session cookies
#    • per-IP rate-limit counters
#    • brute-force / banned-IP tracking
#    • short-lived linking & verification challenges (TTL 10–30 min)
#    • Telegram bot FSM (grammy)
#    • install-banner UX preferences
# ════════════════════════════════════════════════════════════════════════════

services:
  reiwa-redis:
    image: valkey/valkey:9-alpine
    container_name: reiwa-redis
    hostname: reiwa-redis
    restart: unless-stopped
    command: ["--requirepass", "${REDIS_PASSWORD}", "--bind", "0.0.0.0"]
    volumes:
      - reiwa-redis-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 3
    networks:
      - remnawave-network

  reiwa:
    # Прод тянет готовый образ из GHCR (CI публикует его на push в main и тег v*).
    # Обновление на VPS:  `docker compose pull && docker compose up -d`.
    # `build:` оставлен для локальной пересборки — он тегает ровно этот же image.
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/dizzzable/reiwa:latest
    container_name: reiwa
    hostname: reiwa
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${REIWA_PORT:-5000}:${REIWA_PORT:-5000}"
    depends_on:
      reiwa-redis:
        condition: service_healthy
    healthcheck:
      # node:alpine ships no curl/wget — use node's own http client.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.REIWA_PORT||5000)+'/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - remnawave-network

  reiwa-bot:
    # Тот же unified image, что и reiwa (API + bot + worker + SPA).
    image: ghcr.io/dizzzable/reiwa:latest
    container_name: reiwa-bot
    hostname: reiwa-bot
    restart: unless-stopped
    command: ["node", "dist/bot/main.js"]
    env_file:
      - .env
    depends_on:
      reiwa-redis:
        condition: service_healthy
    networks:
      - remnawave-network

networks:
  remnawave-network:
    name: remnawave-network
    external: true

volumes:
  reiwa-redis-data:
    name: reiwa-redis-data
