# ════════════════════════════════════════════════════════════════════════════
#  reiwa — Docker Compose
#
#  reiwa is a stateless edge / BFF (Backend for Frontend) for the Rezeis
#  user-facing surface (Telegram Mini App + Web). It owns no relational
#  state: every business read and write is proxied to rezeis-admin over
#  HTTP inside the shared `remnawave-network`.
#
#  The only stateful dependency reiwa has is reiwa-redis, used for
#  ephemeral edge concerns:
#    • web/TMA session cookies
#    • per-IP rate-limit counters
#    • brute-force / banned-IP tracking
#    • short-lived linking & verification challenges (TTL 10–30 min)
#    • Telegram bot FSM (grammy)
#    • install-banner UX preferences
# ════════════════════════════════════════════════════════════════════════════

services:
  reiwa-redis:
    image: valkey/valkey:9-alpine
    container_name: reiwa-redis
    hostname: reiwa-redis
    restart: unless-stopped
    command: ["--requirepass", "${REDIS_PASSWORD}", "--bind", "0.0.0.0"]
    volumes:
      - reiwa-redis-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 3s
      timeout: 10s
      retries: 3
    networks:
      - remnawave-network

  reiwa:
    # Прод тянет ГОТОВЫЙ образ из GHCR (CI публикует на push в main и тег v*).
    # Установка/обновление на VPS — без исходников:
    #   docker compose pull && docker compose up -d
    # Локальная сборка из исходников — через build-оверлей:
    #   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
    image: ghcr.io/dizzzable/reiwa:latest
    container_name: reiwa
    hostname: reiwa
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${REIWA_PORT:-5000}:${REIWA_PORT:-5000}"
    volumes:
      # Disk mirror of operator branding assets (logo / PWA icon) proxied from
      # rezeis-admin. Lets the brand survive an admin-panel outage. Set
      # BRANDING_CACHE_DIR=/data/branding-cache in .env to use this mount.
      - reiwa-branding-cache:/data/branding-cache
    depends_on:
      reiwa-redis:
        condition: service_healthy
    healthcheck:
      # node:alpine ships no curl/wget — use node's own http client.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.REIWA_PORT||5000)+'/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - remnawave-network

  reiwa-bot:
    # Тот же unified image, что и reiwa (API + bot + worker + SPA).
    image: ghcr.io/dizzzable/reiwa:latest
    container_name: reiwa-bot
    hostname: reiwa-bot
    restart: unless-stopped
    command: ["node", "dist/bot/main.js"]
    env_file:
      - .env
    depends_on:
      reiwa-redis:
        condition: service_healthy
    healthcheck:
      # The bot is a single foreground Node process. A missing production
      # BOT_TOKEN makes it exit non-zero, so Docker can report the service as
      # failed instead of leaving a silent disabled container running.
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - remnawave-network

  # ── Local Bot API Server (OPT-IN) ──────────────────────────────────────────
  # Self-hosted Telegram Bot API server that raises the bot's sendDocument
  # upload limit from 50 MB → 2 GB (needed to deliver large DB backups to
  # Telegram). Disabled by default; enable with:
  #   docker compose --profile bigfiles up -d
  # Requires TELEGRAM_API_ID + TELEGRAM_API_HASH (from https://my.telegram.org)
  # in .env, and set TELEGRAM_BOT_API_ROOT=http://telegram-bot-api:8081 so the
  # bot routes through it. One-time: the bot must log out of the cloud API
  # before first use of a local server (see docs/notes).
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    hostname: telegram-bot-api
    restart: unless-stopped
    profiles: ["bigfiles"]
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    networks:
      - remnawave-network

networks:
  # Общая сеть с rezeis и (если на этом же VPS) с Remnawave. По ней reiwa
  # ходит к rezeis по имени `rezeis:8000`. Сеть ВНЕШНЯЯ — должна существовать
  # до старта, иначе docker ругается «could not be found».
  #   • Remnawave на этом же VPS → сеть уже создана Remnawave.
  #   • Иначе создайте один раз:  docker network create remnawave-network
  #     (нужна для связи reiwa ↔ rezeis даже без Remnawave рядом).
  remnawave-network:
    name: remnawave-network
    external: true

volumes:
  reiwa-redis-data:
    name: reiwa-redis-data
  reiwa-branding-cache:
    name: reiwa-branding-cache
  telegram-bot-api-data:
    name: telegram-bot-api-data
