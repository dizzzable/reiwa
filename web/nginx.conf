server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── Security headers ───────────────────────────────────────────────
    add_header X-Frame-Options "ALLOWALL";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header X-XSS-Protection "1; mode=block";

    # ── API proxy → reiwa service (express on REIWA_PORT) ──────────────
    # Use Docker's embedded DNS (127.0.0.11) + a variable upstream so nginx
    # re-resolves `reiwa` on each request instead of caching the IP it saw
    # at worker start. Without this, recreating the `reiwa` container (which
    # gives it a new internal IP) leaves nginx proxying to a dead address and
    # every /api call 502s until nginx is reloaded.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $reiwa_upstream "reiwa";
        proxy_pass http://$reiwa_upstream:5000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # ── SPA fallback ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
